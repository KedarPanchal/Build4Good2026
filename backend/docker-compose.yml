services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    ports:
      - "5678:5678"
    networks:
      - n8n-network
    volumes:
      - ./shared:/data/shared
      - n8n-data:/home/node/.n8n
    environment:
      - "N8N_BLOCK_FILE_ACCESS_TO_N8N_FILES=false"
      - "N8N_RESTRICT_FILE_ACCESS_TO=/data/shared"
      # Since n8n requires credentials (this is for a hackathon, so security really doesn't matter):
      # Email: hackathon@build4good.com
      # Password: Building4Good

  barsearch:    
    build:
      context: ./barsearch
      dockerfile: Dockerfile
    ports:
      - "6000:6000"
    networks:
      - n8n-network
  
networks:
  n8n-network:
    driver: bridge

volumes:
  n8n-data:
    driver: local
