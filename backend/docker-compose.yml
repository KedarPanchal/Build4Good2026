services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    ports:
      - "5678:5678"
    networks:
      - n8n-network
    volumes:
      - ./n8n/shared:/data/shared
      - n8n-data:/home/node/.n8n
    env_file:
      - ./n8n/.env
    environment:
      - "N8N_BLOCK_FILE_ACCESS_TO_N8N_FILES=false"
      - "N8N_RESTRICT_FILE_ACCESS_TO=/data/shared"
      - "N8N_BLOCK_ENV_ACCESS_IN_NODE=false"
      # Since n8n requires credentials (this is for a hackathon, so security really doesn't matter):
      # Email: hackathon@build4good.com
      # Password: Building4Good
 
networks:
  n8n-network:
    driver: bridge

volumes:
  n8n-data:
    driver: local
