<script>
// Prevent form submission on Enter key (except when clicking Search button)
document.addEventListener('DOMContentLoaded', () => {
  const form = document.getElementById('search-form');
  
  form.addEventListener('submit', (e) => {
    e.preventDefault();
    // Handle search logic here when Search button is clicked
    console.log('Search submitted');
  });
  
  // Prevent Enter key from submitting form in input fields
  form.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA' && e.target.type !== 'submit') {
      e.preventDefault();
    }
  });
});

// Dual Range Slider Implementation
document.addEventListener('DOMContentLoaded', () => {
  const slider = document.querySelector('.dual-range-slider');
  const trackFill = slider.querySelector('.track-fill');
  const thumbs = slider.querySelectorAll('.thumb');
  const minInput = document.getElementById('price-min-input');
  const maxInput = document.getElementById('price-max-input');
  
  // Price range configuration (in dollars per hour)
  const MIN_PRICE = 0;
  const MAX_PRICE = 1000;
  const MIN_RANGE = 5; // Minimum difference between min and max must be at least $5
  
  let minPrice = 250; // Initial min price
  let maxPrice = 850; // Initial max price
  let activeThumb = null;
  
  function priceToPercent(price) {
    return ((price - MIN_PRICE) / (MAX_PRICE - MIN_PRICE)) * 100;
  }
  
  function percentToPrice(percent) {
    return Math.round(MIN_PRICE + (percent / 100) * (MAX_PRICE - MIN_PRICE));
  }
  
  function updateDisplay() {
    // Clamp prices to valid range
    minPrice = Math.max(MIN_PRICE, Math.min(MAX_PRICE - MIN_RANGE, minPrice));
    maxPrice = Math.max(minPrice + MIN_RANGE, Math.min(MAX_PRICE, maxPrice));
    
    const minPercent = priceToPercent(minPrice);
    const maxPercent = priceToPercent(maxPrice);
    
    trackFill.style.left = `${minPercent}%`;
    trackFill.style.right = `${100 - maxPercent}%`;
    
    thumbs[0].style.left = `${minPercent}%`;
    thumbs[1].style.left = `${maxPercent}%`;
    
    minInput.value = minPrice;
    maxInput.value = maxPrice;
  }
  
  function onMouseMove(e) {
    if (!activeThumb) return;
    
    const rect = slider.getBoundingClientRect();
    const x = e.clientX - rect.left;
    let percent = Math.max(0, Math.min(100, (x / rect.width) * 100));
    let price = percentToPrice(percent);
    
    if (activeThumb === thumbs[0]) {
      // Left thumb (min) - can't go past right thumb minus MIN_RANGE
      minPrice = Math.min(price, maxPrice - MIN_RANGE);
    } else {
      // Right thumb (max) - can't go before left thumb plus MIN_RANGE
      maxPrice = Math.max(price, minPrice + MIN_RANGE);
    }
    
    updateDisplay();
  }
  
  function onMouseUp() {
    activeThumb = null;
    document.removeEventListener('mousemove', onMouseMove);
    document.removeEventListener('mouseup', onMouseUp);
  }
  
  thumbs.forEach(thumb => {
    thumb.addEventListener('mousedown', (e) => {
      e.preventDefault();
      activeThumb = thumb;
      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mouseup', onMouseUp);
    });
  });
  
  // Handle manual input changes
  minInput.addEventListener('change', () => {
    let value = parseInt(minInput.value) || MIN_PRICE;
    minPrice = Math.max(MIN_PRICE, Math.min(value, maxPrice - MIN_RANGE));
    updateDisplay();
  });
  
  maxInput.addEventListener('change', () => {
    let value = parseInt(maxInput.value) || MAX_PRICE;
    maxPrice = Math.min(MAX_PRICE, Math.max(value, minPrice + MIN_RANGE));
    updateDisplay();
  });
  
  // Prevent invalid characters in number inputs
  [minInput, maxInput].forEach(input => {
    input.addEventListener('keypress', (e) => {
      if (!/[0-9]/.test(e.key) && e.key !== 'Enter' && e.key !== 'Backspace') {
        e.preventDefault();
      }
    });
  });
  
  // Touch support for mobile
  thumbs.forEach(thumb => {
    thumb.addEventListener('touchstart', (e) => {
      e.preventDefault();
      activeThumb = thumb;
    });
  });
  
  document.addEventListener('touchmove', (e) => {
    if (!activeThumb) return;
    const touch = e.touches[0];
    const rect = slider.getBoundingClientRect();
    const x = touch.clientX - rect.left;
    let percent = Math.max(0, Math.min(100, (x / rect.width) * 100));
    let price = percentToPrice(percent);
    
    if (activeThumb === thumbs[0]) {
      minPrice = Math.min(price, maxPrice - MIN_RANGE);
    } else {
      maxPrice = Math.max(price, minPrice + MIN_RANGE);
    }
    
    updateDisplay();
  });
  
  document.addEventListener('touchend', () => {
    activeThumb = null;
  });
  
  // Initialize display
  updateDisplay();
});

// Language Multi-Select with Dropdown
const selectedLanguages = new Set();
document.addEventListener('DOMContentLoaded', () => {
  const container = document.getElementById('language-container');
  const input = document.getElementById('language-input');
  const dropdown = document.getElementById('language-dropdown');
  const dropdownToggle = document.getElementById('language-dropdown-toggle');
  
  // Common languages spoken in Texas legal practice
  const availableLanguages = [
    'English', 'Spanish', 'Mandarin', 'Vietnamese', 'French', 'Arabic', 
    'Korean', 'German', 'Hindi', 'Urdu', 'Portuguese', 'Japanese', 
    'Italian', 'Russian', 'Polish', 'Tagalog', 'Thai', 'Farsi'
  ];
  
  function createLanguageTag(language) {
    const tag = document.createElement('div');
    tag.className = 'bg-primary/20 border border-primary/30 text-primary px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1 transition-all hover:bg-primary/30';
    tag.innerHTML = `
      <span class="material-symbols-outlined text-xs cursor-pointer hover:text-white">close</span>
      ${language}
    `;
    
    tag.querySelector('.material-symbols-outlined').addEventListener('click', () => {
      selectedLanguages.delete(language);
      tag.remove();
      renderDropdown();
    });
    
    return tag;
  }
  
  function renderDropdown(filter = '') {
    dropdown.innerHTML = '';
    const lowerFilter = filter.toLowerCase();
    
    const filtered = availableLanguages.filter(lang => 
      !selectedLanguages.has(lang) && 
      lang.toLowerCase().includes(lowerFilter)
    );
    
    if (filtered.length === 0) {
      dropdown.innerHTML = '<div class="language-option" style="cursor: default; color: #8892b0;">No matches found</div>';
      return;
    }
    
    filtered.forEach(lang => {
      const option = document.createElement('div');
      option.className = 'language-option';
      option.textContent = lang;
      option.addEventListener('click', () => {
        addLanguage(lang);
      });
      dropdown.appendChild(option);
    });
  }
  
  function addLanguage(language) {
    if (selectedLanguages.has(language)) return;
    
    selectedLanguages.add(language);
    const tag = createLanguageTag(language);
    container.insertBefore(tag, input);
    input.value = '';
    renderDropdown();
    hideDropdown();
  }
  
  function showDropdown() {
    dropdown.classList.add('show');
    dropdownToggle.style.transform = 'rotate(180deg)';
  }
  
  function hideDropdown() {
    dropdown.classList.remove('show');
    dropdownToggle.style.transform = 'rotate(0deg)';
  }
  
  // Toggle dropdown on arrow click
  dropdownToggle.addEventListener('click', (e) => {
    e.stopPropagation();
    if (dropdown.classList.contains('show')) {
      hideDropdown();
    } else {
      renderDropdown(input.value);
      showDropdown();
    }
  });
  
  // Show dropdown on input focus
  input.addEventListener('focus', () => {
    renderDropdown(input.value);
    showDropdown();
  });
  
  // Filter dropdown as user types
  input.addEventListener('input', () => {
    renderDropdown(input.value);
    if (!dropdown.classList.contains('show')) {
      showDropdown();
    }
  });
  
  // Add language on Enter key
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      const value = input.value.trim();
      if (value) {
        // Check if exact match exists in available languages
        const exactMatch = availableLanguages.find(
          lang => lang.toLowerCase() === value.toLowerCase()
        );
        if (exactMatch) {
          addLanguage(exactMatch);
        } else {
          // Add custom language with proper capitalization
          const customLang = value.charAt(0).toUpperCase() + value.slice(1).toLowerCase();
          availableLanguages.push(customLang);
          addLanguage(customLang);
        }
      }
    }
  });
  
  // Click container to focus input
  container.addEventListener('click', () => {
    input.focus();
  });
  
  // Close dropdown when clicking outside
  document.addEventListener('click', (e) => {
    if (!container.contains(e.target) && !dropdown.contains(e.target)) {
      hideDropdown();
    }
  });
  
  // Initialize with empty dropdown
  renderDropdown();
});
</script>
